<div (click)="goToModify()"
  class="group relative max-w-sm p-6 bg-white border border-slate-200 rounded-2xl shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer overflow-hidden">


  <div [class]="'absolute top-0 left-0 h-full w-1.5 transition-colors duration-500 ' + 
                (hero.completata ? 'bg-emerald-500' : 'bg-slate-200 group-hover:bg-blue-500')">
  </div>

  <div class="flex justify-between items-start mb-4">
    <div>
      <h3 class="text-lg font-bold text-slate-800 group-hover:text-blue-600 transition-colors">
        {{ hero.nome }}
      </h3>
      <span class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Classifica Eroe</span>
    </div>


    <div [class]="'px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider transition-all ' + 
                  (hero.completata ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500')">
      {{ hero.completata ? 'Disponibile' : 'In Missione' }}
    </div>
  </div>

  <div class="mb-6">
    <label class="block text-[11px] font-semibold text-slate-400 uppercase mb-1">Specialità</label>
    <p class="text-slate-600 text-sm leading-relaxed italic">
      "{{ hero.potere }}"
    </p>
  </div>

  <div class="flex gap-3">
    <button (click)="$event.stopPropagation(); notifyParent()" [disabled]="hero.completata" [class]="'flex-1 py-2.5 rounded-xl font-semibold text-xs transition-all flex items-center justify-center gap-2 ' + 
                     (hero.completata 
                      ? 'bg-slate-50 text-slate-400 border border-slate-100 cursor-not-allowed' 
                      : 'bg-slate-900 text-white hover:bg-blue-600 shadow-md active:scale-95')">
      <span *ngIf="hero.completata">🔒</span>
      {{ hero.completata ? 'Archiviata' : 'Completa Missione' }}
    </button>

    <!-- Bottone Modifica Rapida -->
    <button (click)="goToModify()"
      class="p-2.5 bg-slate-50 text-slate-500 rounded-xl hover:bg-blue-50 hover:text-blue-600 transition-colors border border-slate-100">
      <svg xmlns="http://w3.org" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
      </svg>
    </button>
  </div>
</div>
