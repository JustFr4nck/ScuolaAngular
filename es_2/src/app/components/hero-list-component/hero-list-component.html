<div class="max-w-6xl mx-auto p-6 space-y-8">

    <!-- Intestazione e Statistiche -->
    <div class="flex items-center justify-between border-b pb-4">
        <h1 class="text-2xl font-extrabold text-gray-800 tracking-tight italic">HERO DASHBOARD</h1>
        <p class="bg-blue-100 text-blue-800 px-4 py-1 rounded-full text-sm font-bold shadow-sm">
            Missioni completate: {{ totalCompleted }} / {{ heroes.length }}
        </p>
    </div>

    <!-- Griglia Eroi -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <app-hero-card-component *ngFor="let h of heroes" [hero]="h" (onMissionDone)="markAsDone(h)"
            (click)="heroChoose = h" class="cursor-pointer transform hover:-translate-y-1 transition-transform">
        </app-hero-card-component>
    </div>

    <!-- Sezione Modifica -->
    <div class="mt-12 bg-gray-50 p-8 rounded-2xl border-2 border-dashed border-gray-200">
        <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">
            <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
            {{ heroChoose.id ? 'Modifica Eroe' : 'Seleziona un eroe per modificare' }}
        </h2>

        <app-hero-edit [hero]="heroChoose" (newHeroAdded)="addMission($event)">
        </app-hero-edit>
    </div>

</div>
