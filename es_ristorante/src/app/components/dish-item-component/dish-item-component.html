<div class="flex items-center justify-between p-4 mb-3 bg-white rounded-lg shadow-sm border border-gray-100 hover:shadow-md transition-shadow">

  <div class="flex flex-col">
    <span class="text-lg font-semibold text-gray-800">{{ piatto.nome }}</span>
    <span class="text-sm text-indigo-600 font-medium">{{ piatto.prezzo | currency:'EUR' }}</span>
  </div>

  <div class="flex items-center space-x-4 bg-gray-50 rounded-full px-3 py-1 border border-gray-200">
    <button
      (click)="modifica(-1)"
      [disabled]="piatto.quantita <= 0"
      class="w-8 h-8 flex items-center justify-center rounded-full bg-white border border-gray-300 text-gray-600 hover:bg-red-50 hover:text-red-600 disabled:opacity-30 disabled:cursor-not-allowed transition-colors shadow-sm">
      -
    </button>

    <span class="text-lg font-bold w-6 text-center text-gray-700">{{ piatto.quantita }}</span>

    <button
      (click)="modifica(1)"
      class="w-8 h-8 flex items-center justify-center rounded-full bg-indigo-600 text-white hover:bg-indigo-700 transition-colors shadow-sm">
      +
    </button>
  </div>
</div>
